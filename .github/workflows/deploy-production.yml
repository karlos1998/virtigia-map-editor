name: Build and Deploy Virtigia Map Editor (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download environment from Envly
        env:
          ENVLY_API_URL: "https://envly.xyz/api/env/margatron-map-editor"
          ENVLY_TOKEN: ${{ secrets.ENVLY_TOKEN }}
        run: |
          curl -fsSL \
            -H "Authorization: Bearer ${ENVLY_TOKEN}" \
            "${ENVLY_API_URL}" > .env

      - name: Build Docker image
        run: docker build -t virtigia-map-editor:${{ github.sha }} .

      - name: Save Docker image
        run: docker save virtigia-map-editor:${{ github.sha }} | gzip > virtigia-map-editor-production.tar.gz

      - name: Create tag file
        run: echo "${{ github.sha }}" > TAG

      - name: Deploy artifacts to /tmp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "virtigia-map-editor-production.tar.gz,TAG,.env,./docker-compose.production.yml"
          target: "/tmp/virtigia-map-editor-production"

      - name: Prepare server network
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            docker network create virtigia-network || true
            docker image prune -a -f --filter "until=24h" || true

      - name: Deploy and restart services
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e

            TARGET="virtigia-map-editor"
            mkdir -p /opt/apps/$TARGET
            cp -f /tmp/virtigia-map-editor-production/TAG /opt/apps/$TARGET/TAG
            cp -f /tmp/virtigia-map-editor-production/.env /opt/apps/$TARGET/.env
            cp -f /tmp/virtigia-map-editor-production/docker-compose.production.yml /opt/apps/$TARGET/docker-compose.production.yml
            cp -f /tmp/virtigia-map-editor-production/virtigia-map-editor-production.tar.gz /opt/apps/$TARGET/virtigia-map-editor-production.tar.gz

            cd /opt/apps/$TARGET
            export TAG=$(cat TAG)
            echo "Deploying version $TAG to $TARGET"

            docker compose -f docker-compose.production.yml down || true
            docker load < virtigia-map-editor-production.tar.gz

            docker compose -f docker-compose.production.yml up -d mysql redis meilisearch
            sleep 10
            docker compose -f docker-compose.production.yml run --rm app php artisan migrate --force --no-interaction
            docker compose -f docker-compose.production.yml up -d app worker scheduler
