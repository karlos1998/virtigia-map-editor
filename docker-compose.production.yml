services:
  app:
    image: virtigia-map-editor:${TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VIRTUAL_HOST: ${VIRTUAL_HOST}
      VIRTUAL_PORT: 80
    depends_on:
      - mysql
      - redis
      - meilisearch
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - virtigia-network
      - nginx-proxy

  worker:
    image: virtigia-map-editor:${TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
      - meilisearch
    command: php artisan horizon
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - virtigia-network

  scheduler:
    image: virtigia-map-editor:${TAG:-latest}
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
      - meilisearch
    command: >
      sh -lc 'while true; do php artisan schedule:run --no-interaction; sleep 60; done'
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - virtigia-network

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - virtigia-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - virtigia-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-}
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - virtigia-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

networks:
  virtigia-network:
    external: true
  nginx-proxy:
    external: true
    name: nginx-proxy

volumes:
  mysql_data:
  redis_data:
  meilisearch_data:
  app_storage:
